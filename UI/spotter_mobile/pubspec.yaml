name: spotter_mobile
description: "Spotter mobile app for event discovery and booking"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  provider: ^6.1.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  flutter_stripe: ^11.4.0
  flutter_dotenv: ^5.1.0
  signalr_netcore: ^1.3.4
  shared_preferences_linux: ^2.4.1
  path_provider_linux: ^2.2.1
  shared_preferences_windows: ^2.4.1
  permission_handler_windows: ^0.2.1
  geolocator_windows: ^0.2.5
  path_provider_windows: ^2.3.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
